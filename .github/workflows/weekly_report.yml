name: Weekly Market Report

on:
  schedule:
    # UTC 时间每周五 08:00 = 北京时间每周五 16:00
    - cron: '0 8 * * 5'
  workflow_dispatch:   # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install akshare yfinance pandas matplotlib requests python-dotenv

      - name: Fetch market data (A股 + 美股)
        # GitHub Actions 环境不需要代理，而 01_fetch_data.py 中硬编码了代理设置，
        # 这里通过设置 CI=true 环境变量，并在脚本中判断跳过代理。
        # 如果不想修改脚本，可以在运行前 unset 代理环境变量。
        run: |
          # 清除可能存在的代理环境变量（避免连接失败）
          unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy
          python scripts/01_fetch_data.py
        env:
          # 告诉脚本运行在 CI 环境，可在脚本中用 os.getenv('CI') 判断是否跳过代理
          CI: true

      - name: Generate AI summary via MiniMax
        run: python scripts/02_generate_summary.py
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # 安装最新版 Quarto
          version: '1.4.554'

      - name: Install Chinese fonts (for matplotlib)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-zenhei
          # 清除 matplotlib 字体缓存
          rm -rf ~/.cache/matplotlib

      - name: Render report to HTML and PDF
        run: quarto render report_template.qmd --to html,pdf

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 添加生成的 data 和 output 目录（但注意 data/weekly_data.json 和 data/ai_summary.txt 可能每次都会变）
          git add data/ output/ || true
          # 如果有变更则提交
          git diff --cached --quiet || git commit -m "chore: auto-generate weekly report $(date +'%Y-%m-%d')"
          git push