name: Weekly Market Report

on:
  schedule:
    - cron: '0 8 * * 5'   # 北京时间每周五 16:00（UTC 8:00）
  workflow_dispatch:        # 允许手动触发

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare yfinance pandas matplotlib requests python-dotenv

      - name: Fetch data
        run: python scripts/01_fetch_data.py

      - name: Generate AI summary (MiniMax)
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
        run: python scripts/02_generate_summary.py

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render report
        run: quarto render report_template.qmd --to html,pdf

      - name: Commit and push output
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add output/ data/
          git commit -m "chore: weekly report $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push